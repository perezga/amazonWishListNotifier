services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=wishlist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"

  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../scraper/amazonPriceUpdateNotifier.properties:/app/scraper/amazonPriceUpdateNotifier.properties
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://user:password@db/wishlist
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - PYTHONPATH=/app
    depends_on:
      - db
    restart: unless-stopped
    command: python scraper/amazonPriceUpdateNotification.py

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=postgresql://user:password@db/wishlist
      - PYTHONPATH=/app
    depends_on:
      - db
    restart: unless-stopped
    command: uvicorn api.api:app --host 0.0.0.0 --port 8010

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
